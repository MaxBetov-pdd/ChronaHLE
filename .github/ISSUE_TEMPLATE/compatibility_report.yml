name: Compatibility report
description: Report how an application behaves in a specific ChronaHLE build.
title: "[Compatibility]: "
labels: [compatibility]
body:
  - type: input
    id: application
    attributes:
      label: Application and version
    validations:
      required: true
  - type: input
    id: bundle_id
    attributes:
      label: Bundle identifier
      placeholder: com.example.application
    validations:
      required: true
  - type: input
    id: guest
    attributes:
      label: Guest details
      description: ARM architecture and minimum iOS version, if known.
    validations:
      required: true
  - type: input
    id: build
    attributes:
      label: ChronaHLE version
      description: Release tag or full commit ID.
    validations:
      required: true
  - type: dropdown
    id: host
    attributes:
      label: Host platform
      options:
        - Windows x86_64
        - Linux x86_64
        - Android ARM64
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Result
      options:
        - Does not boot
        - Boots
        - Reaches menu
        - Gameplay
        - Playable with issues
        - Playable
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe graphics, input, audio, loading, saves and network behavior.
    validations:
      required: true
  - type: checkboxes
    id: legal
    attributes:
      label: Checklist
      options:
        - label: I did not attach the application, copyrighted assets or private data.
          required: true
