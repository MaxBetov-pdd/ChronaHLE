name: ChronaHLE CI and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chronahle-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: ChronaHLE-Windows-x86_64
          - os: ubuntu-24.04
            artifact: ChronaHLE-Linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Configure Git line endings
        if: runner.os == 'Windows'
        shell: pwsh
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply ChronaHLE vendor patches
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./dev-scripts/apply-vendor-patches.sh

      - name: Apply ChronaHLE vendor patches on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./dev-scripts/apply-vendor-patches.ps1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libboost-dev libasound2-dev libpulse-dev libsndio-dev libudev-dev libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxss-dev libwayland-dev libxkbcommon-dev

      - name: Install Boost on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl.exe -L -o boost.7z https://archives.boost.io/release/1.81.0/source/boost_1_81_0.7z
          7z x boost.7z -ovendor
          Move-Item vendor/boost_1_81_0 vendor/boost

      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check

      - name: Unit tests
        run: cargo test --release --lib

      - name: Release build
        run: cargo build --release --bin ChronaHLE

      - name: Package desktop artifact
        shell: bash
        run: |
          mkdir -p artifacts/ChronaHLE
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/ChronaHLE.exe artifacts/ChronaHLE/ChronaHLE.exe
          else
            cp target/release/ChronaHLE artifacts/ChronaHLE/ChronaHLE
            chmod +x artifacts/ChronaHLE/ChronaHLE
          fi
          cp -R ChronaHLE_dylibs ChronaHLE_fonts artifacts/ChronaHLE/
          cp ChronaHLE_default_options.txt LICENSE FORK_NOTICE.md README.md artifacts/ChronaHLE/
          if [ "$RUNNER_OS" = "Windows" ]; then
            (cd artifacts && 7z a "${{ matrix.artifact }}.zip" ChronaHLE)
          else
            tar -C artifacts -czf "artifacts/${{ matrix.artifact }}.tar.gz" ChronaHLE
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}.*
          if-no-files-found: error

  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3
      - name: Install Android SDK and NDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;28.0.13004108"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Apply ChronaHLE vendor patches
        run: bash ./dev-scripts/apply-vendor-patches.sh

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 3.5.4 --locked

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Install Boost headers for Android
        run: |
          curl -L -o boost.tar.gz https://archives.boost.io/release/1.81.0/source/boost_1_81_0.tar.gz
          tar -xzf boost.tar.gz -C vendor
          mv vendor/boost_1_81_0 vendor/boost

      - name: Configure Android SDK path
        run: printf 'sdk.dir=%s\n' "$ANDROID_HOME" > android/local.properties

      - name: Restore release signing key
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.CHRONAHLE_RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.CHRONAHLE_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.CHRONAHLE_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.CHRONAHLE_RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64" || { echo "Missing CHRONAHLE_RELEASE_KEYSTORE_BASE64"; exit 1; }
          test -n "$RELEASE_STORE_PASSWORD" || { echo "Missing CHRONAHLE_RELEASE_STORE_PASSWORD"; exit 1; }
          test -n "$RELEASE_KEY_ALIAS" || { echo "Missing CHRONAHLE_RELEASE_KEY_ALIAS"; exit 1; }
          test -n "$RELEASE_KEY_PASSWORD" || { echo "Missing CHRONAHLE_RELEASE_KEY_PASSWORD"; exit 1; }
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release.jks"

      - name: Build Android release
        working-directory: android
        env:
          CHRONAHLE_RELEASE_KEYSTORE: ${{ github.workspace }}/release.jks
          CHRONAHLE_RELEASE_STORE_PASSWORD: ${{ secrets.CHRONAHLE_RELEASE_STORE_PASSWORD }}
          CHRONAHLE_RELEASE_KEY_ALIAS: ${{ secrets.CHRONAHLE_RELEASE_KEY_ALIAS }}
          CHRONAHLE_RELEASE_KEY_PASSWORD: ${{ secrets.CHRONAHLE_RELEASE_KEY_PASSWORD }}
        run: bash ./gradlew --no-daemon assembleRelease

      - name: Verify APK and 16 KB ELF alignment
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -c -P 16 -v 4 "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose "$APK"
          for library in android/app/src/main/jniLibs/arm64-v8a/*.so; do
            echo "Checking $library"
            "$ANDROID_HOME/ndk/28.0.13004108/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf" -lW "$library" | awk '/LOAD/ { if ($NF != "0x4000" && $NF != "0x10000") exit 1 }'
          done

      - name: Name Android artifact
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/ChronaHLE-Android-arm64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: ChronaHLE-Android-arm64
          path: artifacts/ChronaHLE-Android-arm64.apk

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [desktop, android]
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create release archives
        run: |
          mkdir -p dist
          cp release-artifacts/ChronaHLE-Windows-x86_64/ChronaHLE-Windows-x86_64.zip dist/
          cp release-artifacts/ChronaHLE-Linux-x86_64/ChronaHLE-Linux-x86_64.tar.gz dist/
          cp release-artifacts/ChronaHLE-Android-arm64/ChronaHLE-Android-arm64.apk dist/
          (cd dist && sha256sum ChronaHLE-* > SHA256SUMS.txt)
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ChronaHLE-Windows-x86_64.zip
            dist/ChronaHLE-Linux-x86_64.tar.gz
            dist/ChronaHLE-Android-arm64.apk
            dist/SHA256SUMS.txt
          generate_release_notes: true
